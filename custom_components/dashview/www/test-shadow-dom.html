<!DOCTYPE html>
<html>
<head>
    <title>DashView CSS Shadow DOM Test</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin: 20px; font-family: Arial, sans-serif; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; }
        .status { padding: 10px; margin: 10px 0; }
        .error { background: #ffebee; color: #c62828; }
        .success { background: #e8f5e8; color: #2e7d32; }
        .warning { background: #fff3e0; color: #f57c00; }
    </style>
</head>
<body>
    <h1>DashView CSS Shadow DOM Test</h1>
    
    <div class="test-section">
        <h2>Regular DOM Test (should be unstyled)</h2>
        <div class="dashboard-container">
            <div class="placeholder">Regular DOM Placeholder</div>
            <div class="info-card">
                <div class="info-section">
                    <span class="info-text">Regular DOM Info Text</span>
                    <span class="info-badge">Badge</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="test-section">
        <h2>Shadow DOM Test (should be styled)</h2>
        <div id="shadow-host"></div>
        <div id="status"></div>
    </div>
    
    <script>
        const statusDiv = document.getElementById('status');
        
        function addStatus(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.textContent = message;
            statusDiv.appendChild(div);
            console.log(`[${type.toUpperCase()}] ${message}`);
        }
        
        // Create shadow DOM exactly like dashview-panel.js
        const host = document.getElementById('shadow-host');
        const shadow = host.attachShadow({ mode: 'open' });
        
        async function loadStylesheetsInline(shadow) {
            const stylesheets = [
                {
                    name: 'Google Fonts',
                    url: 'https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap',
                    type: 'link',
                    critical: true
                },
                {
                    name: 'Material Design Icons',
                    url: 'https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css',
                    type: 'link',
                    critical: true
                },
                {
                    name: 'Main Stylesheet', 
                    url: 'http://localhost:8000/style.css',
                    type: 'inline',
                    critical: true
                }
            ];

            for (const stylesheet of stylesheets) {
                try {
                    addStatus(`Loading ${stylesheet.name}...`);

                    if (stylesheet.type === 'link') {
                        // Fixed approach: Use a <link> element for external stylesheets with relative assets
                        const linkElement = document.createElement('link');
                        linkElement.setAttribute('rel', 'stylesheet');
                        linkElement.setAttribute('href', stylesheet.url);
                        linkElement.setAttribute('data-source', stylesheet.name);
                        shadow.insertBefore(linkElement, shadow.firstChild);
                        addStatus(`${stylesheet.name} linked successfully`, 'success');
                    } else {
                        // Inline approach for local CSS
                        const response = await fetch(stylesheet.url);
                        if (!response.ok) {
                            throw new Error(`Failed to fetch ${stylesheet.name}: ${response.status} ${response.statusText}`);
                        }
                        
                        const cssText = await response.text();
                        
                        const styleElement = document.createElement('style');
                        styleElement.setAttribute('data-source', stylesheet.name);
                        styleElement.textContent = cssText;
                        
                        shadow.insertBefore(styleElement, shadow.firstChild);
                        
                        addStatus(`${stylesheet.name} loaded successfully (${cssText.length} characters)`, 'success');
                    }
                    
                } catch (error) {
                    addStatus(`Failed to load ${stylesheet.name}: ${error.message}`, 'error');
                    
                    if (stylesheet.critical) {
                        // For critical stylesheets, create a fallback style element with basic styles
                        const fallbackStyle = document.createElement('style');
                        fallbackStyle.setAttribute('data-source', `${stylesheet.name} (fallback)`);
                        
                        if (stylesheet.name === 'Main Stylesheet') {
                            // Provide essential fallback styles
                            fallbackStyle.textContent = `
                                body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
                                .dashboard-container { max-width: 500px; margin: 0 auto; padding: 12px; }
                                .placeholder { background: #f0f0f0; padding: 16px; margin: 8px 0; border-radius: 8px; }
                                .info-card { background: #fff; padding: 16px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; }
                            `;
                        } else if (stylesheet.name === 'Material Design Icons') {
                            // Provide fallback icons using Unicode symbols
                            fallbackStyle.textContent = `
                                .mdi::before {
                                    display: inline-block;
                                    font-style: normal;
                                    font-variant: normal;
                                    text-rendering: auto;
                                    line-height: 1;
                                    font-family: system-ui, -apple-system, sans-serif;
                                }
                                .mdi-home::before { content: "🏠"; }
                                .mdi-security::before { content: "🔒"; }
                                .mdi-lightbulb::before { content: "💡"; }
                                .mdi-music::before { content: "🎵"; }
                                .mdi-cog::before { content: "⚙️"; }
                                .mdi-devices::before { content: "📱"; }
                            `;
                        }
                        
                        shadow.insertBefore(fallbackStyle, shadow.firstChild);
                        addStatus(`Fallback styles applied for ${stylesheet.name}`, 'warning');
                    }
                }
            }
            
            addStatus('All stylesheets processed', 'success');
        }
        
        async function loadContent() {
            try {
                // Load HTML content
                addStatus('Fetching HTML content...');
                const htmlResponse = await fetch('http://localhost:8000/index.html');
                if (!htmlResponse.ok) {
                    throw new Error(`Failed to load HTML: ${htmlResponse.status}`);
                }
                const htmlText = await htmlResponse.text();
                addStatus('HTML content loaded successfully', 'success');
                
                // Load CSS first
                addStatus('Loading stylesheets...');
                await loadStylesheetsInline(shadow);
                
                // Then add HTML content
                addStatus('Inserting HTML content...');
                const content = document.createElement('div');
                content.innerHTML = htmlText;
                shadow.appendChild(content);
                
                addStatus('Content loading complete!', 'success');
                
            } catch (error) {
                addStatus(`Error: ${error.message}`, 'error');
            }
        }
        
        // Start the loading process
        loadContent();
    </script>
</body>
</html>
