refresh_dashboard:
  name: Refresh Dashboard
  description: Refresh the DashView dashboard content
  fields: {}

set_weather_entity:
  name: Set Weather Entity
  description: Sets the primary weather entity for the DashView panel.
  fields:
    entity_id:
      name: Entity ID
      description: The entity_id of the weather provider (e.g., weather.forecast_home).
      required: true
      example: "weather.forecast_home"
      selector:
        entity:
          domain: weather

set_temperature_config:
  name: Set Temperature Configuration
  description: Sets the temperature sensor configuration for rooms.
  fields:
    config:
      name: Configuration
      description: JSON configuration for temperature sensors by room.
      required: true
      example: '{"Sauna": [{"temperature_sensor": "sensor.humidity_sauna_temperature", "humidity_sensor": "sensor.humidity_sauna_humidity"}]}'
