# Example room card configuration using the light section

# Example 1: Single room card with light section
example_room_card:
  type: vertical-stack
  cards:
    # Room header card
    - type: custom:button-card
      name: "Wohnzimmer"
      icon: mdi:sofa
      styles:
        card:
          - background: var(--primary-color)
          - color: white
          - height: 60px
        name:
          - font-size: 20px
          - font-weight: bold

    # Light section using the include template
    - type: custom:mod-card
      card: !include
        - light_section.yaml
        - room: "Wohnzimmer"

    # Additional room sections could be added here
    # - !include
    #   - sensor_section.yaml
    #   - room: "Wohnzimmer"
    
    # - !include
    #   - climate_section.yaml
    #   - room: "Wohnzimmer"

# Example 2: Grid layout with multiple rooms
example_grid_layout:
  type: grid
  cards:
    - type: vertical-stack
      cards:
        - type: custom:button-card
          name: "Küche"
          icon: mdi:chef-hat
        - type: custom:mod-card
          card: !include
            - light_section.yaml
            - room: "Küche"
    
    - type: vertical-stack
      cards:
        - type: custom:button-card
          name: "Büro"
          icon: mdi:desk
        - type: custom:mod-card
          card: !include
            - light_section.yaml
            - room: "Büro"

# Example 3: Configuration.yaml setup for decluttering templates
configuration_example:
  decluttering_templates:
    sensor_small_swipe: !include lovelace/templates/sensor_small_swipe.yaml
    sensor_small: !include lovelace/templates/sensor_small.yaml
  
  # OR use directory include
  # decluttering_templates: !include_dir_named lovelace/templates/