type: custom:mod-card
card_mod:
  style: |
    ha-card {
      margin: 8px;
      border-radius: 12px;
    }
    :host([expanded]) ha-card {
      border-radius: 12px;
    }
card:
  type: custom:expander-card 
  child-margin-top: 10px
  margin: -10px
  title-card-button-overlay: true
  title-card-clickable: false
  expander-card-background: var(--gray200)
  button-background: transparent
  expander-card-background-expanded: var(--gray200)
  header-color: var(--1000)
  child-padding: 0px
  expanded: false
  card-border-radius: 12px
  title-card:
    type: custom:button-card
    name: Licht
    icon: mdi:lightbulb
    entity: >
      [[[ 
        let roomLights = [];
        {% if room in room_lights %}
        roomLights = {{ room_lights[room] | tojson }};
        {% endif %}
        
        // Return the first light entity to trigger updates
        return roomLights.length > 0 ? roomLights[0] : "";
      ]]]
    tap_action:
      action: none
    custom_fields:
      count: >-
        [[[ 
          // Count active lights for the room
          let roomLights = [];
          {% if room in room_lights %}
          roomLights = {{ room_lights[room] | tojson }};
          {% endif %}
          let onCount = 0;
          let totalCount = roomLights.length;
          
          for (const light of roomLights) {
            if (states[light] && states[light].state === "on") {
              onCount++;
            }
          }
          
          return `${onCount} von ${totalCount} Lichter an`;
        ]]]
    styles:
      grid:
        - grid-template-areas: '"i n count"'
        - grid-template-columns: min-content 1fr min-content
      icon:
        - width: 22px
        - padding-left: 12px
        - padding-right: 12px
        - color: var(--gray1000)
      card:
        - background: none
        - padding: 3px 3px
        - overflow: visible 
        - margin-left: -15px
        - '--mdc-ripple-press-opacity': 0 
      name:
        - color: var(--gray1000)  
        - font-size: 16px
        - font-weight: 500
        - justify-self: start
        - align-self: center
      custom_fields:
        count:
          - color: var(--gray600)
          - font-size: 14px
          - align-self: center
          - display: flex
          - align-items: center
          - justify-self: end
          - padding-right: 20px   
          - margin-right: 10px
  cards:
    - type: vertical-stack
      cards:
        - type: custom:mod-card
          style: |
            ha-card {
              margin-left: 0px !important;
              margin-right: 0px !important;
              margin-top: 40px !important;
            } 
          card:
            type: vertical-stack
            cards:
              {% if room in room_lights and room_lights[room]|length > 0 %}
              {% for light_entity in room_lights[room] %}
              {% if light_entity.startswith('light.') or light_entity.startswith('switch.') %}
              - type: custom:decluttering-card
                template: sensor_small_swipe
                variables:
                  - entity: "{{ light_entity }}"
                  - type: "light"
              {% endif %}
              {% endfor %}
              {% else %}
              - type: markdown
                content: "Keine Lichter gefunden"
                card_mod:
                  style: |
                    ha-card {
                      box-shadow: none;
                      padding: 8px 16px;
                    }
                    ha-markdown {
                      padding: 0;
                    }
              {% endif %}