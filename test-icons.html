<!DOCTYPE html>
<html>
<head>
    <title>MDI Test Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        .test-container {
            border: 1px solid #ccc;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .icon-demo {
            font-size: 24px;
            margin: 10px;
            display: inline-block;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        dashview-panel {
            display: block;
            border: 2px solid #007bff;
            border-radius: 8px;
            min-height: 300px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>DashView MDI Icons Test</h1>
    
    <div class="test-container">
        <h2>DashView Panel Component</h2>
        <dashview-panel id="test-panel"></dashview-panel>
    </div>

    <div class="test-container">
        <h2>Direct Icon Test (Navigation Icons)</h2>
        <div>
            <span class="icon-demo mdi mdi-home"></span> Home
            <span class="icon-demo mdi mdi-security"></span> Security  
            <span class="icon-demo mdi mdi-calendar"></span> Calendar
            <span class="icon-demo mdi mdi-music"></span> Music
            <span class="icon-demo mdi mdi-cog"></span> Settings
        </div>
    </div>

    <script type="module">
        // Load the DashView panel script
        import('./custom_components/dashview/www/dashview-panel.js')
            .then(() => {
                console.log('DashView panel loaded');
                
                // Create a mock HASS object
                const mockHass = {
                    states: {
                        'weather.test': {
                            state: 'sunny',
                            attributes: {
                                temperature: 22,
                                friendly_name: 'Test Weather'
                            }
                        }
                    }
                };
                
                // Get the panel element and set HASS
                const panel = document.getElementById('test-panel');
                if (panel) {
                    setTimeout(() => {
                        panel.hass = mockHass;
                    }, 500);
                }
            })
            .catch(error => {
                console.error('Failed to load DashView panel:', error);
                document.getElementById('test-panel').innerHTML = `
                    <div style="color: red; padding: 20px;">
                        <h3>Error Loading Panel</h3>
                        <p>${error.message}</p>
                        <p>Check browser console for more details.</p>
                    </div>
                `;
            });
    </script>
</body>
</html>
